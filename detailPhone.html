<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Smartphone</h1>
</header>

<main class="container">

    <section class="table-container">
        <h2>Product Specifications</h2>
        <table>
            <tr>
                <th>Specification</th>
                <th>Details</th>
            </tr>
            <tr>
                <td>Brand</td>
                <td>Apple</td>
            </tr>
            <tr>
                <td>Storage</td>
                <td>128GB</td>
            </tr>
            <tr>
                <td>Color</td>
                <td>Black</td>
            </tr>
        </table>
    </section>

    <section>
        <form action="cart.html">
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" value="1" min="1">
            <br><br>
            <button type="submit">Add to Cart</button>
        </form>
    </section>

    <section>
        <h2>User Reviews</h2>

        <article class="review">
            <p>This smartphone is very fast and reliable.</p>
        </article>

        <article class="review">
            <p>Battery life lasts all day.</p>
        </article>

    </section>

</main>

</body>
</html>
