<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Your Cart - Headphones</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Your Cart</h1>
</header>

<main class="container">

    <ul class="cart">

        <li class="cart-item">
            <img src="https://via.placeholder.com/100" alt="Headphones">
            <div>
                <h3>Headphones</h3>
                <p class="price">500</p>
            </div>
            <input type="number" value="1" min="1">
        </li>

    </ul>

    <section>
        <h2>Subtotal: <span class="price">500</span></h2>
    </section>

    <a href="checkout.html">
        <button>Proceed to Checkout</button>
    </a>

</main>

</body>
</html>
