<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Headphones Detail</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Headphones</h1>
</header>

<main class="container">

    <section class="table-container">
        <h2>Product Specifications</h2>
        <table>
            <tr>
                <th>Specification</th>
                <th>Details</th>
            </tr>
            <tr>
                <td>Brand</td>
                <td>JBL</td>
            </tr>
            <tr>
                <td>Noise Cancellation</td>
                <td>Active</td>
            </tr>
            <tr>
                <td>Color</td>
                <td>Black</td>
            </tr>
        </table>
    </section>

    <section>
        <form action="cartHeadphone.html">
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" value="1" min="1">
            <br><br>
            <button type="submit">Add to Cart</button>
        </form>
    </section>

    <section>
        <h2>User Reviews</h2>
        <article class="review">
            <p>Very clear sound and comfortable to wear.</p>
        </article>
        <article class="review">
            <p>Battery lasts a long time, love it!</p>
        </article>
    </section>

</main>

</body>
</html>
